<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f7a5b" />
    <meta name="description" content="Daily Duas carousel with Arabic text, transliteration, and meanings." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Daily Duas" />
    <title>Daily Duas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #f5f2e9;
        --surface: #fffdf7;
        --surface-soft: #eef6ef;
        --line: #d8e3d7;
        --text: #213026;
        --muted: #5a6a5d;
        --accent: #1f7a5b;
        --accent-soft: #d7ece2;
        --shadow: 0 18px 40px rgba(21, 47, 35, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Manrope", system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1400px 540px at -8% -18%, rgba(31, 122, 91, 0.16), transparent 58%),
          radial-gradient(900px 450px at 110% 6%, rgba(196, 152, 69, 0.14), transparent 60%),
          repeating-linear-gradient(
            45deg,
            rgba(31, 122, 91, 0.04) 0,
            rgba(31, 122, 91, 0.04) 10px,
            transparent 10px,
            transparent 34px
          ),
          var(--bg);
      }

      .app {
        min-height: 100svh;
        max-width: 960px;
        margin: 0 auto;
        padding: clamp(12px, 2.5vw, 24px);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: clamp(10px, 2vw, 16px);
      }

      .app-header {
        padding: clamp(10px, 2vw, 18px);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(238, 246, 239, 0.9));
        backdrop-filter: blur(1px);
      }

      .app-header h1 {
        margin: 0;
        font-size: clamp(1.25rem, 2.4vw, 1.7rem);
        line-height: 1.15;
      }

      .app-header p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: clamp(0.86rem, 1.9vw, 0.96rem);
      }

      .carousel-shell {
        min-height: 0;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 8px;
      }

      .carousel-viewport {
        min-height: 0;
        overflow: hidden;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow);
        touch-action: pan-y;
        cursor: grab;
      }

      .carousel-viewport:active {
        cursor: grabbing;
      }

      .carousel-track {
        height: 100%;
        display: flex;
        transition: transform 320ms cubic-bezier(0.2, 0.6, 0.2, 1);
        will-change: transform;
      }

      .slide {
        min-width: 100%;
        height: 100%;
        padding: clamp(10px, 2.4vw, 18px);
        display: flex;
      }

      .dua-card {
        width: min(760px, 100%);
        margin: 0 auto;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, var(--surface) 0%, var(--surface-soft) 100%);
        padding: clamp(14px, 3vw, 22px);
        overflow-y: auto;
        max-height: 100%;
        scroll-behavior: smooth;
      }

      .dua-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .dua-id {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--accent-soft);
        background: #f6fbf8;
        color: var(--accent);
        font-weight: 700;
        font-size: 0.8rem;
      }

      .dua-title {
        margin: 10px 0 0;
        font-size: clamp(1.05rem, 2.5vw, 1.32rem);
        line-height: 1.35;
      }

      .arabic {
        margin: 14px 0 0;
        direction: rtl;
        text-align: right;
        font-family: "Noto Naskh Arabic", serif;
        font-size: clamp(1.45rem, 4vw, 2rem);
        line-height: 1.9;
        color: #0f3528;
      }

      .section {
        margin-top: 12px;
      }

      .label {
        margin: 0;
        font-size: 0.73rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #537563;
      }

      .value {
        margin: 4px 0 0;
        line-height: 1.58;
      }

      .transliteration {
        font-style: italic;
      }

      .categories {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .category {
        display: inline-flex;
        align-items: center;
        padding: 4px 9px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #165d44;
        font-size: 0.79rem;
        font-weight: 600;
      }

      .meta-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .meta-item {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
      }

      .meta-item strong {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #547767;
      }

      .meta-item span {
        display: block;
        margin-top: 4px;
        font-size: 0.92rem;
      }

      .indicator {
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 600;
      }

      .app-footer {
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
        padding: 3px 0 1px;
      }

      .status-card {
        width: min(700px, 100%);
        margin: auto;
        padding: 20px;
        text-align: center;
      }

      .status-card strong {
        color: #a83939;
      }

      @media (max-width: 680px) {
        .meta-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <header class="app-header">
        <h1>Daily Duas</h1>
        <p>Swipe left or right to move between duas.</p>
      </header>

      <main class="carousel-shell" aria-live="polite">
        <section class="carousel-viewport" id="carouselViewport">
          <div class="carousel-track" id="carouselTrack">
            <article class="slide">
              <div class="dua-card status-card">
                <p class="value">Loading duas...</p>
              </div>
            </article>
          </div>
        </section>
        <div class="indicator" id="slideIndicator">0 / 0</div>
      </main>

      <footer class="app-footer">Brought from your local <code>duas.json</code> file.</footer>
    </div>

    <script>
      const track = document.getElementById("carouselTrack");
      const viewport = document.getElementById("carouselViewport");
      const indicator = document.getElementById("slideIndicator");

      const state = {
        duas: [],
        index: 0,
        touchStartX: 0,
        touchStartY: 0,
        touchActive: false,
        pointerStartX: 0,
        pointerStartY: 0,
        pointerActive: false,
      };

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function parseCategories(raw) {
        if (!raw) {
          return [];
        }

        if (Array.isArray(raw)) {
          return raw;
        }

        if (typeof raw === "string") {
          try {
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [raw];
          } catch {
            return raw
              .split(",")
              .map((item) => item.trim())
              .filter(Boolean);
          }
        }

        return [];
      }

      function sortDuas(a, b) {
        const aOrder = Number.isFinite(Number(a.sort_order)) ? Number(a.sort_order) : Number.MAX_SAFE_INTEGER;
        const bOrder = Number.isFinite(Number(b.sort_order)) ? Number(b.sort_order) : Number.MAX_SAFE_INTEGER;

        if (aOrder !== bOrder) {
          return aOrder - bOrder;
        }

        return Number(a.id || 0) - Number(b.id || 0);
      }

      function updateIndicator() {
        const total = state.duas.length;
        const current = total ? state.index + 1 : 0;
        indicator.textContent = `${current} / ${total}`;
      }

      function goToSlide(index, animate = true) {
        const total = state.duas.length;
        if (!total) {
          return;
        }

        const wrapped = ((index % total) + total) % total;
        state.index = wrapped;

        track.style.transition = animate ? "transform 320ms cubic-bezier(0.2, 0.6, 0.2, 1)" : "none";
        track.style.transform = `translateX(-${wrapped * 100}%)`;
        updateIndicator();
      }

      function renderStatus(message, isError = false) {
        const text = isError
          ? `<p class=\"value\"><strong>Could not load duas.</strong><br />${escapeHtml(message)}</p>`
          : `<p class=\"value\">${escapeHtml(message)}</p>`;

        track.innerHTML = `
          <article class="slide">
            <div class="dua-card status-card">
              ${text}
            </div>
          </article>
        `;

        state.duas = [];
        state.index = 0;
        updateIndicator();
      }

      function renderSlides(duas) {
        const fragments = duas.map((dua) => {
          const categories = parseCategories(dua.categories)
            .map((category) => `<span class="category">${escapeHtml(category)}</span>`)
            .join("");

          const metaItems = [
            dua.source ? `<div class="meta-item"><strong>Source</strong><span>${escapeHtml(dua.source)}</span></div>` : "",
            dua.reference ? `<div class="meta-item"><strong>Reference</strong><span>${escapeHtml(dua.reference)}</span></div>` : "",
            dua.recitation_count !== null && dua.recitation_count !== undefined && dua.recitation_count !== ""
              ? `<div class="meta-item"><strong>Recitations</strong><span>${escapeHtml(dua.recitation_count)}</span></div>`
              : "",
          ].filter(Boolean);

          return `
            <article class="slide" aria-label="Dua ${escapeHtml(dua.id ?? "")}">
              <div class="dua-card" tabindex="0">
                <div class="dua-top">
                  <span class="dua-id">Dua #${escapeHtml(dua.id ?? "-")}</span>
                </div>

                <h2 class="dua-title">${escapeHtml(dua.title || "Untitled Dua")}</h2>

                ${dua.arabic_text ? `<p class="arabic">${escapeHtml(dua.arabic_text)}</p>` : ""}

                ${dua.transliteration ? `
                  <section class="section">
                    <p class="label">Transliteration</p>
                    <p class="value transliteration">${escapeHtml(dua.transliteration)}</p>
                  </section>
                ` : ""}

                ${dua.english_translation ? `
                  <section class="section">
                    <p class="label">Translation</p>
                    <p class="value">${escapeHtml(dua.english_translation)}</p>
                  </section>
                ` : ""}

                ${dua.english_meaning ? `
                  <section class="section">
                    <p class="label">Meaning</p>
                    <p class="value">${escapeHtml(dua.english_meaning)}</p>
                  </section>
                ` : ""}

                ${dua.benefits ? `
                  <section class="section">
                    <p class="label">Benefits</p>
                    <p class="value">${escapeHtml(dua.benefits)}</p>
                  </section>
                ` : ""}

                ${categories ? `<div class="categories">${categories}</div>` : ""}

                ${metaItems.length ? `<div class="meta-grid">${metaItems.join("")}</div>` : ""}
              </div>
            </article>
          `;
        });

        track.innerHTML = fragments.join("");
      }

      function shouldTriggerSwipe(deltaX, deltaY) {
        const horizontalDistance = Math.abs(deltaX);
        const verticalDistance = Math.abs(deltaY);
        return horizontalDistance > 56 && horizontalDistance > verticalDistance * 1.2;
      }

      function handleSwipe(deltaX, deltaY) {
        if (!shouldTriggerSwipe(deltaX, deltaY)) {
          return;
        }

        if (deltaX < 0) {
          goToSlide(state.index + 1);
        } else {
          goToSlide(state.index - 1);
        }
      }

      function setupInteractions() {
        viewport.addEventListener("touchstart", (event) => {
          const touch = event.touches[0];
          state.touchStartX = touch.clientX;
          state.touchStartY = touch.clientY;
          state.touchActive = true;
        }, { passive: true });

        viewport.addEventListener("touchend", (event) => {
          if (!state.touchActive) {
            return;
          }

          const touch = event.changedTouches[0];
          const deltaX = touch.clientX - state.touchStartX;
          const deltaY = touch.clientY - state.touchStartY;
          state.touchActive = false;

          handleSwipe(deltaX, deltaY);
        }, { passive: true });

        viewport.addEventListener("pointerdown", (event) => {
          if (event.pointerType !== "mouse" && event.pointerType !== "pen") {
            return;
          }

          state.pointerStartX = event.clientX;
          state.pointerStartY = event.clientY;
          state.pointerActive = true;
          viewport.setPointerCapture(event.pointerId);
        });

        viewport.addEventListener("pointerup", (event) => {
          if (!state.pointerActive) {
            return;
          }

          state.pointerActive = false;
          const deltaX = event.clientX - state.pointerStartX;
          const deltaY = event.clientY - state.pointerStartY;
          handleSwipe(deltaX, deltaY);
        });

        viewport.addEventListener("pointercancel", () => {
          state.pointerActive = false;
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "ArrowRight") {
            goToSlide(state.index + 1);
          }

          if (event.key === "ArrowLeft") {
            goToSlide(state.index - 1);
          }
        });
      }

      async function loadDuas() {
        renderStatus("Loading duas...");

        try {
          const response = await fetch("./duas.json", { cache: "no-cache" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          if (!Array.isArray(payload) || payload.length === 0) {
            throw new Error("No dua entries found in duas.json.");
          }

          state.duas = payload.slice().sort(sortDuas);
          renderSlides(state.duas);
          goToSlide(0, false);
        } catch (error) {
          const message = error instanceof Error ? error.message : "Unknown error while loading data.";
          renderStatus(message, true);
        }
      }

      setupInteractions();
      loadDuas();
    </script>
  </body>
</html>
